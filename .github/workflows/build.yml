name: build

# Runs the test suite on every push. On version tags it builds the Windows exe,
# macOS .app (Apple Silicon) and a Linux binary, cuts a Release, then attaches an
# Intel-mac build best-effort (so a slow/unavailable Intel runner never blocks
# the release of everything else).
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to create Releases on tag builds

jobs:
  # -------------------------------------------------------------- tests
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests (standard library only)
        run: python -m unittest discover -s tests -v

  # -------------------------------------------------------------- Windows
  windows:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pyinstaller pillow
      - name: Build exe
        shell: pwsh
        run: ./build_windows.ps1
      - name: Check the exe exists
        shell: pwsh
        run: if (-not (Test-Path dist/FLIndexRenders.exe)) { throw "exe not built" }
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/FLIndexRenders.exe

  # ----------------------------------------------- macOS (Apple Silicon)
  macos_arm64:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pyinstaller pillow
      - name: Build .app
        run: bash build_mac.sh
      - name: Zip the .app
        run: cd dist && ditto -c -k --keepParent FLIndexRenders.app FLIndexRenders-macos-arm64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/FLIndexRenders-macos-arm64.zip

  # -------------------------------------------------------------- Linux
  linux:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Tk + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
          python -m pip install --upgrade pyinstaller pillow
      - name: Build Linux binary
        run: |
          python assets/make_icon.py
          python -m PyInstaller --onefile --windowed --noconfirm --clean \
            --name FLIndexRenders \
            --add-data "assets/icon.png:assets" \
            app.py
          mv dist/FLIndexRenders dist/FLIndexRenders-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/FLIndexRenders-linux-x86_64

  # -------------------------------------------------------------- Release
  # Depends only on the reliably-available runners so a queued Intel-mac runner
  # can never hold the release hostage.
  release:
    needs: [windows, macos_arm64, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            **FLIndexRenders** — find every render FL Studio exported, treed by project, with the samples that went into each.

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows 10/11 | `FLIndexRenders.exe` (portable, no install) |
            |  macOS (Apple Silicon) | `FLIndexRenders-macos-arm64.zip` |
            | 🐧 Linux (x86_64) | `FLIndexRenders-linux-x86_64` |

            An Intel-mac build (`FLIndexRenders-macos-x86_64.zip`) is attached shortly after,
            when a runner is available. Or build it in seconds from source: `./build_mac.sh`.

            macOS is unsigned: first launch is **right‑click → Open**. Windows may show a
            SmartScreen prompt → **More info → Run anyway**. See the
            [README](https://github.com/1ajh/FLIndexRenders#readme).

  # ------------------------------------------- macOS (Intel), best-effort
  # Runs after the release exists and attaches its artifact. If no Intel runner
  # is available it simply never completes — the release is already published.
  macos_intel:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-13
    timeout-minutes: 30
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pyinstaller pillow
      - name: Build .app
        run: bash build_mac.sh
      - name: Zip + attach to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist && ditto -c -k --keepParent FLIndexRenders.app FLIndexRenders-macos-x86_64.zip
          gh release upload "${GITHUB_REF_NAME}" FLIndexRenders-macos-x86_64.zip --clobber
